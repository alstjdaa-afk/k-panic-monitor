name: Daily Market Data Update

on:
  schedule:
    # 매주 월~금 16:40 KST (07:40 UTC) — 장마감 후 실행
    - cron: '40 7 * * 1-5'
  workflow_dispatch:   # 수동 실행 버튼도 활성화

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install finance-datareader pandas

      - name: Collect today's data
        run: python update_data.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.csv
          git diff --cached --quiet || git commit -m "data: $(date +'%Y-%m-%d') update"
          git push
